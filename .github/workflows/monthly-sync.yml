# Monthly Ads sync — runs on the 2nd of every month at 06:37 IST.
#
# Why the 2nd, not the 1st:
#   Amazon's 14-day attribution window keeps shifting "last month" totals
#   for ~24h after the month closes.  Running on the 2nd gives the
#   attribution one extra day to settle before we snapshot the numbers
#   the operator will reconcile against.
#
# Why :07 minute (not :00 / :15 / :30 / :45):
#   GitHub Actions shared-runner cron buckets get hammered on the round
#   minutes — schedules often skip or arrive 10-15 min late.  :07 is an
#   off-peak slot that fires reliably.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   AMS_ADS_CLIENT_ID
#   AMS_ADS_CLIENT_SECRET
#   AMS_ADS_REFRESH_TOKEN     (AdPilot-style JSON dict — same value used
#                              in the weekly project's .env so the cron
#                              auto-discovers all 6 profiles)
#
# The default GITHUB_TOKEN has push access (no PAT needed) provided the
# repo's workflow write permission is enabled:
#   Settings -> Actions -> General -> Workflow permissions
#                                  -> Read and write permissions.

name: Monthly Ads Sync

on:
  schedule:
    - cron: '7 1 2 * *'        # 02nd of every month, 01:07 UTC = 06:37 IST
  # Mid-month refresh triggers — pushing a fresh operator-exported file
  # (business_report or 1Psales for any brand × month folder) kicks off
  # a re-run so attribution + raw output stay in sync with the inputs.
  push:
    branches: [main]
    paths:
      - 'data/*/Jan/**'
      - 'data/*/Feb/**'
      - 'data/*/Mar/**'
      - 'data/*/Apr/**'
      - 'data/*/May/**'
      - 'data/*/Jun/**'
      - 'data/*/Jul/**'
      - 'data/*/Aug/**'
      - 'data/*/Sep/**'
      - 'data/*/Oct/**'
      - 'data/*/Nov/**'
      - 'data/*/Dec/**'
      - 'data/master/sku_master.xlsx'
  workflow_dispatch:           # allow manual trigger from the Actions tab
    inputs:
      start_date:
        description: "Start date YYYY-MM-DD (leave empty = previous calendar month)"
        required: false
        default: ""
      end_date:
        description: "End date YYYY-MM-DD (leave empty = previous calendar month)"
        required: false
        default: ""

permissions:
  contents: write              # needed to push the data refresh commit

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 90        # Reports API can take 35-40 min full-pull

    env:
      AMS_ADS_CLIENT_ID:      ${{ secrets.AMS_ADS_CLIENT_ID }}
      AMS_ADS_CLIENT_SECRET:  ${{ secrets.AMS_ADS_CLIENT_SECRET }}
      AMS_ADS_REFRESH_TOKEN:  ${{ secrets.AMS_ADS_REFRESH_TOKEN }}
      ADS_REGION:             ${{ vars.ADS_REGION || 'EU' }}
      PYTHONIOENCODING:       utf-8
      PYTHONUNBUFFERED:       "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify credentials present
        run: |
          if [ -z "$AMS_ADS_CLIENT_ID" ] || [ -z "$AMS_ADS_CLIENT_SECRET" ] || [ -z "$AMS_ADS_REFRESH_TOKEN" ]; then
            echo "::error::Missing one or more AMS_ADS_* secrets (CLIENT_ID, CLIENT_SECRET, REFRESH_TOKEN)."
            echo "::error::Set them at Settings -> Secrets and variables -> Actions."
            exit 1
          fi
          echo "✓ all AMS_ADS_* secrets present"

      - name: Resolve target month
        id: dates
        run: |
          if [ -n "${{ github.event.inputs.start_date }}" ] && [ -n "${{ github.event.inputs.end_date }}" ]; then
            START="${{ github.event.inputs.start_date }}"
            END="${{ github.event.inputs.end_date }}"
            echo "Using manual override: $START .. $END"
          else
            # First/last day of previous calendar month (UTC).
            START=$(date -u -d "$(date -u +%Y-%m-01) -1 month" +%Y-%m-01)
            END=$(date -u -d "$(date -u +%Y-%m-01) -1 day" +%Y-%m-%d)
            echo "Using previous calendar month: $START .. $END"
          fi
          echo "start=$START" >> "$GITHUB_OUTPUT"
          echo "end=$END" >> "$GITHUB_OUTPUT"

      - name: Run monthly ads pull (submit + poll + write)
        run: |
          python monthly_buybox_pull.py run \
              --start "${{ steps.dates.outputs.start }}" \
              --end   "${{ steps.dates.outputs.end }}"

      - name: Commit + push refreshed CSVs
        run: |
          set -e
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'

          # Stage ONLY the per-brand monthly CSVs the puller produced.
          # Never stage .ads_reports_state.json (gitignored) or any
          # *.log capture files (also gitignored).
          git add 'data/*/[0-9][0-9][0-9][0-9]-[0-9][0-9]/ads_sp.csv'              \
                  'data/*/[0-9][0-9][0-9][0-9]-[0-9][0-9]/ads_sd.csv'              \
                  'data/*/[0-9][0-9][0-9][0-9]-[0-9][0-9]/ads_sb.csv'              \
                  'data/*/[0-9][0-9][0-9][0-9]-[0-9][0-9]/ads_sb_attributed.csv'   \
                  2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No data changes — skipping commit."
            exit 0
          fi

          MONTH_LABEL="${{ steps.dates.outputs.start }}"
          git commit -m "chore(monthly-sync): auto-pull ads for ${MONTH_LABEL:0:7}"

          # Race-safe push: another commit may have landed on main while
          # this job's ~30-min report pull was running.  Pull --rebase
          # before pushing; retry up to 3 times if remote moves again.
          for attempt in 1 2 3; do
            git pull --rebase --autostash origin main || true
            if git push origin main; then
              echo "Push succeeded on attempt $attempt."
              exit 0
            fi
            echo "Push attempt $attempt failed, retrying after fetch..."
            sleep 5
          done
          echo "::error::Push failed after 3 attempts; remote keeps moving."
          exit 1
