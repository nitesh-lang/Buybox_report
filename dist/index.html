<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>BrandIQ Hub — Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#09090b;--accent:#2563eb;--accent-hover:#1d4ed8;
  --accent-glow:rgba(37,99,235,0.18);--border:#e4e4e7;
  --red:#ef4444;--green:#22c55e;
}
html,body{height:100%;font-family:'Space Grotesk',sans-serif;background:#08081a;overflow:hidden}
#canvas{position:fixed;inset:0;z-index:0}
.stage{
  position:relative;z-index:1;
  min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;
  transition:opacity 0.4s;
}
.card{
  width:100%;max-width:460px;
  background:#fff;border-radius:24px;
  box-shadow:0 0 0 1px rgba(255,255,255,0.06),0 24px 80px rgba(0,0,0,0.5);
  overflow:hidden;
  animation:cardIn 0.6s cubic-bezier(0.22,1,0.36,1) both;
}
@keyframes cardIn{from{opacity:0;transform:translateY(28px) scale(0.97)}to{opacity:1;transform:none}}
.card-header{
  background:linear-gradient(135deg,#0f172a 0%,#1e3a8a 60%,#2563eb 100%);
  padding:40px 44px 36px;position:relative;overflow:hidden;
}
.card-header::after{
  content:'';position:absolute;
  width:320px;height:320px;border-radius:50%;
  background:rgba(37,99,235,0.25);top:-120px;right:-100px;
  filter:blur(50px);pointer-events:none;
}
.logo-row{display:flex;align-items:center;gap:12px;margin-bottom:28px;position:relative;z-index:1}
.logo-icon{
  width:42px;height:42px;border-radius:11px;
  background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.2);
  display:flex;align-items:center;justify-content:center;
  font-family:'Outfit',sans-serif;font-weight:800;font-size:18px;color:#fff;
}
.logo-text strong{display:block;font-family:'Outfit',sans-serif;font-size:16px;font-weight:700;color:#fff;letter-spacing:-0.01em}
.logo-text span{font-size:10px;color:rgba(255,255,255,0.45);letter-spacing:0.12em;text-transform:uppercase}
.header-title{position:relative;z-index:1}
.header-title h1{font-family:'Outfit',sans-serif;font-weight:800;font-size:30px;color:#fff;letter-spacing:-0.03em;line-height:1.1;margin-bottom:8px}
.header-title p{font-size:13px;color:rgba(255,255,255,0.5)}
.badges{display:flex;gap:8px;margin-top:20px;position:relative;z-index:1;flex-wrap:wrap}
.badge{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:500;background:rgba(255,255,255,0.1);color:rgba(255,255,255,0.7);border:1px solid rgba(255,255,255,0.12);letter-spacing:0.02em}
.badge.live{background:rgba(34,197,94,0.2);color:#86efac;border-color:rgba(34,197,94,0.3)}
.card-body{padding:36px 44px 40px}
.field{margin-bottom:18px}
.field label{display:block;font-size:11px;font-weight:600;color:#52525b;letter-spacing:0.07em;text-transform:uppercase;margin-bottom:8px}
.input-wrap{position:relative}
.field-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:#a1a1aa;pointer-events:none;display:flex}
.field input{
  width:100%;height:48px;padding:0 44px 0 42px;
  border:1.5px solid var(--border);border-radius:12px;
  font-family:'Space Grotesk',sans-serif;font-size:15px;color:var(--ink);background:#fafafa;
  transition:border-color 0.18s,box-shadow 0.18s,background 0.18s;outline:none;
}
.field input::placeholder{color:#c4c4c8}
.field input:focus{border-color:var(--accent);background:#fff;box-shadow:0 0 0 4px var(--accent-glow)}
.field input.err{border-color:var(--red);box-shadow:0 0 0 4px rgba(239,68,68,0.1)}
.field input.ok{border-color:var(--green)}
.eye-btn{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#a1a1aa;display:flex;align-items:center;padding:2px;transition:color 0.15s}
.eye-btn:hover{color:#52525b}
.err-banner{display:none;margin-bottom:16px;padding:11px 14px;border-radius:10px;background:#fef2f2;border:1px solid #fecaca;font-size:13px;color:#b91c1c;align-items:center;gap:8px}
.err-banner.show{display:flex}
.btn{
  width:100%;height:50px;background:var(--accent);color:#fff;border:none;border-radius:12px;
  font-family:'Outfit',sans-serif;font-weight:700;font-size:15px;letter-spacing:0.01em;
  cursor:pointer;margin-top:4px;display:flex;align-items:center;justify-content:center;gap:8px;
  transition:background 0.18s,transform 0.12s,box-shadow 0.18s;position:relative;overflow:hidden;
}
.btn:hover{background:var(--accent-hover);box-shadow:0 4px 20px rgba(37,99,235,0.35)}
.btn:active{transform:scale(0.985)}
.btn.loading{pointer-events:none;background:#3b82f6}
.btn .spinner{display:none;width:18px;height:18px;border:2.5px solid rgba(255,255,255,0.3);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite}
.btn.loading .spinner{display:block}
@keyframes spin{to{transform:rotate(360deg)}}
.arrow{transition:transform 0.2s}
.btn:hover .arrow{transform:translateX(3px)}
.divider{display:flex;align-items:center;gap:12px;margin:24px 0 0}
.divider hr{flex:1;border:none;border-top:1px solid var(--border)}
.divider span{font-size:11px;color:#c4c4c8;white-space:nowrap;letter-spacing:0.05em;text-transform:uppercase}
.footer{margin-top:20px;text-align:center;font-size:12px;color:#a1a1aa;line-height:1.7}
.footer strong{color:#71717a;font-weight:500}
#app-frame{display:none;position:fixed;inset:0;z-index:10}
#app-frame iframe{width:100%;height:100%;border:none}
@keyframes shake{
  0%,100%{transform:translateX(0)}15%{transform:translateX(-9px)}30%{transform:translateX(9px)}
  45%{transform:translateX(-6px)}60%{transform:translateX(6px)}75%{transform:translateX(-3px)}
}
.shake{animation:shake 0.45s ease}
@media(max-width:520px){.card-header,.card-body{padding-left:28px;padding-right:28px}.card{border-radius:20px}}
</style>
</head>
<body>
<canvas id="canvas"></canvas>
<div class="stage" id="stage">
  <div class="card" id="card">
    <div class="card-header">
      <div class="logo-row">
        <div class="logo-icon">B</div>
        <div class="logo-text">
          <strong>BrandIQ Hub</strong>
          <span>Amazon Performance Intelligence</span>
        </div>
      </div>
      <div class="header-title">
        <h1>Welcome back</h1>
        <p>Sign in to access your dashboard</p>
      </div>
      <div class="badges">
        <div class="badge live">&#9679; Live Data</div>
        <div class="badge">Buy Box Analytics</div>
        <div class="badge">BSR Tracker</div>
      </div>
    </div>
    <div class="card-body">
      <div class="err-banner" id="err-banner">
        <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><circle cx="12" cy="16" r="0.5" fill="currentColor"/></svg>
        <span id="err-text">Invalid credentials. Please try again.</span>
      </div>
      <div class="field">
        <label for="uname">Username</label>
        <div class="input-wrap">
          <span class="field-icon"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" viewBox="0 0 24 24"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-3.866 3.582-7 8-7s8 3.134 8 7"/></svg></span>
          <input type="text" id="uname" placeholder="Enter your username" autocomplete="username"/>
        </div>
      </div>
      <div class="field">
        <label for="pass">Password</label>
        <div class="input-wrap">
          <span class="field-icon"><svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
          <input type="password" id="pass" placeholder="&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;&#9679;" autocomplete="current-password"/>
          <button class="eye-btn" type="button" id="eye-btn" aria-label="Toggle password">
            <svg id="eye-svg" width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" viewBox="0 0 24 24">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>
      <button class="btn" id="login-btn" onclick="doLogin()">
        <div class="spinner"></div>
        <span id="btn-label">Sign In</span>
        <span class="arrow" id="btn-arrow">&#8594;</span>
      </button>
      <div class="divider"><hr/><span>Cambium Retail</span><hr/></div>
      <div class="footer"><strong>Restricted access.</strong> Authorised team members only.<br>Contact your admin for access issues.</div>
    </div>
  </div>
</div>
<div id="app-frame">
  <iframe id="app-iframe" src="" title="BrandIQ Hub Dashboard"></iframe>
</div>
<script>
const cv=document.getElementById('canvas'),ctx=cv.getContext('2d');
let W,H,pts=[];
function resize(){W=cv.width=innerWidth;H=cv.height=innerHeight;pts=Array.from({length:80},()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,r:Math.random()*1.4+.4}))}
resize();addEventListener('resize',resize);
function draw(){
  ctx.clearRect(0,0,W,H);
  pts.forEach((p,i)=>{
    p.x+=p.vx;p.y+=p.vy;
    if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
    ctx.fillStyle='rgba(147,197,253,0.55)';ctx.fill();
    for(let j=i+1;j<pts.length;j++){
      const q=pts[j],dx=p.x-q.x,dy=p.y-q.y,d=Math.sqrt(dx*dx+dy*dy);
      if(d<110){ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(q.x,q.y);ctx.strokeStyle=`rgba(147,197,253,${.13*(1-d/110)})`;ctx.lineWidth=.5;ctx.stroke()}
    }
  });
  requestAnimationFrame(draw);
}
draw();

const CREDS=[{u:'crpl',p:'cambium@109'},{u:'info@cambium.com',p:'cambium@109'},{u:'info@camboum.com',p:'cambium@109'}];
const APP_URL='./app.html';
let visible=false;

document.getElementById('eye-btn').addEventListener('click',()=>{
  visible=!visible;
  document.getElementById('pass').type=visible?'text':'password';
  document.getElementById('eye-svg').innerHTML=visible
    ?`<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>`
    :`<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
});

document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});

function doLogin(){
  const u=document.getElementById('uname').value.trim().toLowerCase();
  const p=document.getElementById('pass').value;
  const btn=document.getElementById('login-btn');
  const err=document.getElementById('err-banner');
  const errTxt=document.getElementById('err-text');
  const lbl=document.getElementById('btn-label');
  const arr=document.getElementById('btn-arrow');

  err.classList.remove('show');
  ['uname','pass'].forEach(id=>document.getElementById(id).classList.remove('err','ok'));

  if(!u||!p){
    errTxt.textContent='Please enter your username and password.';
    err.classList.add('show');
    if(!u)document.getElementById('uname').classList.add('err');
    if(!p)document.getElementById('pass').classList.add('err');
    return;
  }
  btn.classList.add('loading');
  lbl.textContent='Signing in…';
  arr.style.display='none';

  setTimeout(()=>{
    const ok=CREDS.some(c=>c.u===u&&c.p===p);
    if(ok){
      lbl.textContent='Success!';
      ['uname','pass'].forEach(id=>document.getElementById(id).classList.add('ok'));
      setTimeout(()=>{
        document.getElementById('stage').style.opacity='0';
        setTimeout(()=>{
          document.getElementById('stage').style.display='none';
          document.getElementById('canvas').style.display='none';
          document.getElementById('app-frame').style.display='block';
          document.getElementById('app-iframe').src=APP_URL;
        },400);
      },500);
    } else {
      btn.classList.remove('loading');
      lbl.textContent='Sign In';
      arr.style.display='';
      errTxt.textContent='Incorrect username or password. Please try again.';
      err.classList.add('show');
      ['uname','pass'].forEach(id=>document.getElementById(id).classList.add('err'));
      const card=document.getElementById('card');
      card.classList.remove('shake');void card.offsetWidth;card.classList.add('shake');
    }
  },950);
}
</script>
</body>
</html>
